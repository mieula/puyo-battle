<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ぷよぷよ オンライン</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;font-family:'Segoe UI',Arial,sans-serif;color:#fff;overflow-x:hidden}

/* ===== LOBBY ===== */
#lobbyScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 70%)}
.lobby-title{font-size:48px;font-weight:900;background:linear-gradient(135deg,#ff6b9d,#c44dff,#4dffd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;letter-spacing:2px}
.lobby-sub{font-size:16px;color:#aaa;margin-top:-10px}
.lobby-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:28px 36px;display:flex;flex-direction:column;gap:14px;min-width:320px}
.lobby-box h3{font-size:14px;color:#c44dff;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.input-field{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;padding:10px 14px;font-size:16px;outline:none;width:100%;transition:.2s}
.input-field:focus{border-color:#c44dff;background:rgba(196,77,255,0.1)}
.btn-primary{background:linear-gradient(135deg,#c44dff,#7b2fff);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;width:100%}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(196,77,255,.5)}
.btn-secondary{background:rgba(255,255,255,0.1);color:#ddd;border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;width:100%}
.btn-secondary:hover{background:rgba(255,255,255,0.18)}
.room-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto}
.room-item{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:.2s}
.room-item:hover{border-color:#c44dff;background:rgba(196,77,255,0.1)}
.room-name{font-weight:600;font-size:15px}
.room-count{font-size:13px;color:#aaa}
.room-count .num{color:#4dffd4;font-weight:700}
.status-msg{font-size:13px;color:#ff6b9d;text-align:center;min-height:18px}
#onlineCount{font-size:13px;color:#4dffd4;text-align:center}

/* ===== WAITING ROOM ===== */
#waitingScreen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 70%)}
.waiting-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:28px 36px;min-width:380px;text-align:center}
.waiting-box h2{font-size:22px;font-weight:700;margin-bottom:6px;color:#4dffd4}
.waiting-box .room-id{font-size:13px;color:#888;margin-bottom:20px}
.player-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
.player-slot{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 6px;font-size:12px;text-align:center;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.player-slot.filled{border-color:#4dffd4;background:rgba(77,255,212,0.08)}
.player-slot .pname{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70px}
.player-slot .ready-tag{font-size:10px;color:#4dffd4}
.ready-section{display:flex;gap:10px;margin-top:10px}
#readyBtn{flex:1}
#leaveBtn{flex:1;background:rgba(255,80,80,.15);color:#ff8080;border:1px solid rgba(255,80,80,.3);border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
#leaveBtn:hover{background:rgba(255,80,80,.3)}
.start-hint{font-size:13px;color:#aaa;margin-top:10px}

/* ===== GAME ===== */
#gameScreen{display:none;flex-direction:column;align-items:center;padding:10px;gap:6px}
.game-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1600px;padding:4px 10px}
.header-info{font-size:13px;color:#aaa}
.header-info span{color:#4dffd4;font-weight:700}
#leaveGameBtn{background:rgba(255,80,80,.2);color:#ff8080;border:1px solid rgba(255,80,80,.3);border-radius:6px;padding:5px 14px;font-size:13px;cursor:pointer;transition:.2s}
#leaveGameBtn:hover{background:rgba(255,80,80,.4)}

.boards-area{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:flex-start;max-width:1600px}

.board-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.board-label{font-size:11px;font-weight:700;color:#c44dff;text-transform:uppercase;letter-spacing:.5px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.board-label.me{color:#4dffd4}
.board-score{font-size:11px;color:#fff}

/* ME = large board */
.board-wrap.me canvas{border:2px solid #4dffd4}
.board-wrap:not(.me) canvas{border:1.5px solid #2a2a4a;opacity:.85}
.board-wrap:not(.me):hover canvas{opacity:1;border-color:#c44dff}

.board-wrap .dead-overlay{display:none;position:absolute;top:22px;left:0;width:100%;bottom:0;background:rgba(0,0,0,.65);border-radius:4px;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#ff6b6b;flex-direction:column;gap:4px}
.board-wrap.dead .dead-overlay{display:flex}

/* nuisance bar */
.nuisance-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;width:100%;overflow:hidden}
.nuisance-fill{height:100%;background:linear-gradient(90deg,#ff6b9d,#c44dff);border-radius:3px;transition:width .3s}

/* side panel for me */
.me-panel{display:flex;flex-direction:column;gap:8px}
.me-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 14px;text-align:center;min-width:90px}
.me-box h4{font-size:10px;color:#c44dff;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.me-box .val{font-size:22px;font-weight:700}

.alive-count{font-size:13px;font-weight:700;color:#fff}
.alive-count span{color:#ff6b9d}

/* Results */
#resultsScreen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 70%)}
.results-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:32px 40px;min-width:360px;text-align:center}
.results-box h2{font-size:32px;font-weight:900;margin-bottom:6px}
.results-box .rank{font-size:18px;color:#aaa;margin-bottom:20px}
.results-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;max-height:280px;overflow-y:auto}
.result-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.05)}
.result-row.winner{background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.3)}
.result-rank{font-size:18px;font-weight:700;width:28px;text-align:center}
.result-name{flex:1;text-align:left;font-size:15px}
.result-score{font-size:14px;color:#aaa}

/* Audio toggle */
#audioBtn{position:fixed;top:12px;right:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;z-index:100;transition:.2s}
#audioBtn:hover{background:rgba(255,255,255,0.2)}
</style>
</head>
<body>

<button id="audioBtn" onclick="toggleAudio()" title="BGM ON/OFF">🔇</button>

<!-- LOBBY -->
<div id="lobbyScreen">
  <div class="lobby-title">PUYO BATTLE</div>
  <div class="lobby-sub">最大20人でオンライン対戦</div>
  <div id="onlineCount">接続中...</div>

  <div class="lobby-box">
    <h3>プレイヤー名</h3>
    <input class="input-field" id="playerName" placeholder="名前を入力..." maxlength="12" value="">
    <h3>部屋に参加</h3>
    <div id="roomListContainer">
      <div class="room-list" id="roomList"><div style="color:#888;font-size:13px;padding:8px">読み込み中...</div></div>
    </div>
    <div class="status-msg" id="lobbyStatus"></div>
    <button class="btn-primary" onclick="createRoom()">＋ 新しい部屋を作る</button>
    <div class="btn-secondary" onclick="joinRandomRoom()" style="display:flex;align-items:center;justify-content:center;height:42px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600">ランダムマッチング</div>
  </div>
</div>

<!-- WAITING -->
<div id="waitingScreen">
  <div class="waiting-box">
    <h2 id="waitingRoomName">部屋</h2>
    <div class="room-id" id="waitingRoomId"></div>
    <div class="player-grid" id="waitingPlayerGrid"></div>
    <div class="status-msg" id="waitingStatus">プレイヤーを待っています...</div>
    <div class="ready-section">
      <button class="btn-primary" id="readyBtn" onclick="toggleReady()">✓ 準備OK</button>
      <button id="leaveBtn" onclick="leaveRoom()">退出</button>
    </div>
    <div class="start-hint" id="startHint">全員が準備OKになるとゲーム開始（2人以上必要）</div>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen">
  <div class="game-header">
    <div class="header-info">部屋: <span id="gameRoomName"></span> &nbsp;|&nbsp; 生存: <span id="aliveCount">-</span></div>
    <div style="display:flex;gap:12px;align-items:center">
      <div class="header-info">チェーン: <span id="chainDisplay">0</span></div>
      <button id="leaveGameBtn" onclick="leaveRoom()">退出</button>
    </div>
  </div>
  <div style="display:flex;gap:12px;align-items:flex-start">
    <div class="boards-area" id="boardsArea"></div>
    <div class="me-panel" id="mePanel">
      <div class="me-box"><h4>スコア</h4><div class="val" id="myScore">0</div></div>
      <div class="me-box"><h4>レベル</h4><div class="val" id="myLevel">1</div></div>
      <div class="me-box"><h4>NEXT</h4><canvas id="nextCanvas" width="80" height="80"></canvas></div>
      <div class="me-box"><h4>おじゃま</h4><div class="val" id="myNuisance">0</div></div>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="resultsScreen">
  <div class="results-box">
    <h2 id="resultsTitle">GAME OVER</h2>
    <div class="rank" id="resultsRank"></div>
    <div class="results-list" id="resultsList"></div>
    <button class="btn-primary" onclick="backToLobby()">ロビーに戻る</button>
  </div>
</div>

// ===== Audio =====
let audioCtx = null, bgmNodes = [], audioOn = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  startBGM();
  audioOn = true;
  document.getElementById('audioBtn').textContent = '🔊';
}

function toggleAudio() {
  if (!audioCtx) { initAudio(); return; }
  if (audioOn) {
    stopBGM();
    audioOn = false;
    document.getElementById('audioBtn').textContent = '🔇';
  } else {
    startBGM();
    audioOn = true;
    document.getElementById('audioBtn').textContent = '🔊';
  }
}

// Catchy chiptune BGM
function startBGM() {
  if (!audioCtx) return;
  stopBGM();

  const BPM = 160;
  const beat = 60 / BPM;
  const now = audioCtx.currentTime;

  // Melody sequence (note, octave, duration in beats)
  const melody = [
    [0,5,1],[4,5,1],[7,5,1],[4,5,1],
    [0,5,1],[4,5,1],[7,5,2],
    [9,4,1],[0,5,1],[4,5,1],[7,5,1],
    [5,4,1],[9,4,1],[0,5,2],
    [4,5,1],[7,5,1],[11,5,1],[7,5,1],
    [4,5,1],[7,5,1],[11,5,2],
    [9,4,1],[0,5,1],[4,5,1],[7,5,1],
    [5,4,1],[9,4,1],[5,5,4]
  ];

  const bass = [
    [0,3,2],[7,3,2],[5,3,2],[9,3,2],
    [0,3,2],[7,3,2],[5,3,2],[4,3,2],
    [0,3,2],[7,3,2],[5,3,2],[9,3,2],
    [0,3,2],[7,3,2],[4,3,2],[5,3,2]
  ];

  function noteToHz(n, oct) {
    return 440 * Math.pow(2, (n - 9 + (oct - 4) * 12) / 12);
  }

  function playSeq(seq, gain, type, loop) {
    const masterGain = audioCtx.createGain();
    masterGain.gain.value = gain;
    masterGain.connect(audioCtx.destination);

    let t = now;
    let totalDur = seq.reduce((s,[,,d]) => s + d * beat, 0);

    function scheduleOnce(startT) {
      let st = startT;
      seq.forEach(([note, oct, dur]) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = noteToHz(note, oct);
        osc.connect(g);
        g.connect(masterGain);
        const durSec = dur * beat;
        g.gain.setValueAtTime(1, st);
        g.gain.exponentialRampToValueAtTime(0.01, st + durSec * 0.9);
        osc.start(st);
        osc.stop(st + durSec);
        st += durSec;
      });
      return st;
    }

    let nextStart = scheduleOnce(t);
    if (loop) {
      const intervalMs = totalDur * 1000;
      const id = setInterval(() => {
        if (!audioOn && audioCtx) return;
        nextStart = scheduleOnce(audioCtx.currentTime + 0.05);
      }, intervalMs);
      bgmNodes.push({interval: id, gain: masterGain});
    } else {
      bgmNodes.push({gain: masterGain});
    }
  }

  playSeq(melody, 0.12, 'square', true);
  playSeq(bass, 0.09, 'sawtooth', true);

  // Percussion
  function kick(t) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(0.01, t + 0.15);
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.2);
  }
  function snare(t) {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    src.buffer = buf;
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
    src.connect(g); g.connect(audioCtx.destination);
    src.start(t);
  }

  const barLen = 4 * beat * 4;
  let pt = now;
  const drumInterval = setInterval(() => {
    if (!audioOn) return;
    const ct = audioCtx.currentTime;
    for (let i = 0; i < 4; i++) {
      kick(ct + i * beat * 2);
      snare(ct + (i * 2 + 1) * beat);
    }
  }, barLen * 1000 * 0.98);
  bgmNodes.push({interval: drumInterval, gain: null});
}

function stopBGM() {
  bgmNodes.forEach(n => {
    if (n.interval) clearInterval(n.interval);
    if (n.gain) { try { n.gain.disconnect(); } catch(e){} }
  });
  bgmNodes = [];
}

// ===== Firebase REST helpers =====
async function fbGet(path) {
  try {
    const r = await fetch(`${DB_URL}/${path}.json`);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

async function fbSet(path, data) {
  try {
    await fetch(`${DB_URL}/${path}.json`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
  } catch(e) {}
}

async function fbPatch(path, data) {
  try {
    await fetch(`${DB_URL}/${path}.json`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
  } catch(e) {}
}

async function fbDelete(path) {
  try {
    await fetch(`${DB_URL}/${path}.json`, { method: 'DELETE' });
  } catch(e) {}
}

async function fbPush(path, data) {
  try {
    const r = await fetch(`${DB_URL}/${path}.json`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    const j = await r.json();
    return j.name;
  } catch(e) { return null; }
}

// ===== Lobby =====
async function loadRoomList() {
  const rooms = await fbGet('rooms');
  const list = document.getElementById('roomList');
  if (!rooms) {
    list.innerHTML = '<div style="color:#666;font-size:13px;padding:8px;text-align:center">部屋がありません</div>';
    document.getElementById('onlineCount').textContent = '現在 0人 オンライン';
    return;
  }
  const entries = Object.entries(rooms);
  const activeRooms = entries.filter(([id,r]) => r && r.status !== 'closed' && Date.now() - (r.created||0) < 3600000);

  let totalPlayers = 0;
  activeRooms.forEach(([,r]) => { totalPlayers += Object.keys(r.players||{}).length; });
  document.getElementById('onlineCount').textContent = `現在 ${totalPlayers}人 オンライン`;

  if (activeRooms.length === 0) {
    list.innerHTML = '<div style="color:#666;font-size:13px;padding:8px;text-align:center">部屋がありません</div>';
    return;
  }
  list.innerHTML = '';
  activeRooms.forEach(([id,r]) => {
    if (r.status === 'playing') return;
    const count = Object.keys(r.players||{}).length;
    const div = document.createElement('div');
    div.className = 'room-item';
    div.innerHTML = `<span class="room-name">${escHtml(r.name||id)}</span><span class="room-count"><span class="num">${count}</span>/${r.maxPlayers||MAX_PLAYERS}人</span>`;
    div.onclick = () => joinRoom(id);
    list.appendChild(div);
  });
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function createRoom() {
  const name = document.getElementById('playerName').value.trim() || '名無し';
  playerName = name;
  const roomName = prompt('部屋の名前を入力:', `${name}の部屋`) || `${name}の部屋`;
  setLobbyStatus('部屋を作成中...');
  const roomId = await fbPush('rooms', {
    name: roomName,
    maxPlayers: MAX_PLAYERS,
    status: 'waiting',
    created: Date.now(),
    players: {}
  });
  if (!roomId) { setLobbyStatus('接続エラー。再試行してください。'); return; }
  await joinRoom(roomId);
}

async function joinRoom(roomId) {
  const name = document.getElementById('playerName').value.trim() || '名無し';
  playerName = name;
  setLobbyStatus('参加中...');
  const room = await fbGet(`rooms/${roomId}`);
  if (!room) { setLobbyStatus('部屋が見つかりません'); return; }
  const count = Object.keys(room.players||{}).length;
  if (count >= (room.maxPlayers||MAX_PLAYERS)) { setLobbyStatus('満員です'); return; }
  if (room.status === 'playing') { setLobbyStatus('ゲーム中の部屋には参加できません'); return; }

  currentRoomId = roomId;
  isReady = false;
  await fbSet(`rooms/${roomId}/players/${MY_ID}`, {
    name: playerName,
    ready: false,
    alive: true,
    score: 0,
    board: encodeBoard(createBoard()),
    nuisance: 0,
    lastSeen: Date.now()
  });

  // Cleanup on leave
  window.addEventListener('beforeunload', leaveRoom);

  showWaiting(room);
  startWaitingSync();
}

async function joinRandomRoom() {
  const name = document.getElementById('playerName').value.trim() || '名無し';
  playerName = name;
  setLobbyStatus('マッチング中...');
  const rooms = await fbGet('rooms');
  if (rooms) {
    const available = Object.entries(rooms).filter(([id,r]) => {
      const cnt = Object.keys(r.players||{}).length;
      return r.status === 'waiting' && cnt > 0 && cnt < (r.maxPlayers||MAX_PLAYERS) && Date.now()-(r.created||0)<3600000;
    });
    if (available.length > 0) {
      const [id] = available[Math.floor(Math.random()*available.length)];
      await joinRoom(id);
      return;
    }
  }
  // No room found, create one
  setLobbyStatus('空き部屋なし。新規作成...');
  const roomId = await fbPush('rooms', {
    name: `ランダム部屋 ${Date.now().toString(36)}`,
    maxPlayers: MAX_PLAYERS,
    status: 'waiting',
    created: Date.now(),
    players: {}
  });
  if (roomId) await joinRoom(roomId);
}

function setLobbyStatus(msg) { document.getElementById('lobbyStatus').textContent = msg; }

// ===== Waiting Room =====
function showWaiting(room) {
  clearInterval(roomListInterval);
  document.getElementById('lobbyScreen').style.display = 'none';
  document.getElementById('waitingScreen').style.display = 'flex';
  document.getElementById('waitingRoomName').textContent = room.name || currentRoomId;
  document.getElementById('waitingRoomId').textContent = `ID: ${currentRoomId}`;
  document.getElementById('gameRoomName').textContent = room.name || currentRoomId;
}

let waitingSyncInterval = null;
function startWaitingSync() {
  clearInterval(waitingSyncInterval);
  waitingSyncInterval = setInterval(syncWaiting, 1500);
  syncWaiting();
}

async function syncWaiting() {
  if (!currentRoomId) return;
  const room = await fbGet(`rooms/${currentRoomId}`);
  if (!room) return;

  // Heartbeat
  await fbSet(`rooms/${currentRoomId}/players/${MY_ID}/lastSeen`, Date.now());

  roomData = room;
  const players = room.players || {};

  // Render player grid
  const grid = document.getElementById('waitingPlayerGrid');
  grid.innerHTML = '';
  const plist = Object.entries(players);
  const maxSlots = Math.max(plist.length + 1, 4);
  for (let i = 0; i < maxSlots && i < MAX_PLAYERS; i++) {
    const slot = document.createElement('div');
    slot.className = 'player-slot';
    if (i < plist.length) {
      const [uid,p] = plist[i];
      slot.classList.add('filled');
      const isMe = uid === MY_ID;
      slot.innerHTML = `<div class="pname" style="${isMe?'color:#4dffd4':''}">${escHtml(p.name)}${isMe?' (自分)':''}</div><div class="ready-tag">${p.ready?'✓ 準備OK':'待機中...'}</div>`;
    } else {
      slot.innerHTML = '<div style="color:#444;font-size:20px">+</div>';
    }
    grid.appendChild(slot);
  }

  // Check all ready
  const allReady = plist.length >= 2 && plist.every(([,p]) => p.ready);
  document.getElementById('waitingStatus').textContent = allReady ? '全員準備OK！ゲーム開始...' : `${plist.length}人が参加中 (${plist.filter(([,p])=>p.ready).length}人準備OK)`;

  if (room.status === 'playing' || allReady) {
    if (allReady && room.status !== 'playing') {
      await fbPatch(`rooms/${currentRoomId}`, { status: 'playing', startTime: Date.now() });
    }
    clearInterval(waitingSyncInterval);
    startGame(room);
  }
}

async function toggleReady() {
  isReady = !isReady;
  await fbSet(`rooms/${currentRoomId}/players/${MY_ID}/ready`, isReady);
  document.getElementById('readyBtn').textContent = isReady ? '⟳ キャンセル' : '✓ 準備OK';
  document.getElementById('readyBtn').style.background = isReady
    ? 'linear-gradient(135deg,#4dffd4,#00bfa5)'
    : 'linear-gradient(135deg,#c44dff,#7b2fff)';
}

async function leaveRoom() {
  clearInterval(waitingSyncInterval);
  clearInterval(syncInterval);
  if (animFrameId) cancelAnimationFrame(animFrameId);
  if (currentRoomId && MY_ID) {
    await fbDelete(`rooms/${currentRoomId}/players/${MY_ID}`);
    // If room now empty, delete it
    const room = await fbGet(`rooms/${currentRoomId}`);
    if (room && Object.keys(room.players||{}).length === 0) {
      await fbDelete(`rooms/${currentRoomId}`);
    }
  }
  currentRoomId = null;
  gameActive = false;
  backToLobby();
}

// ===== GAME =====
const CELL_S = CELL; // small board cell size

function createBoard() {
  return Array.from({length:ROWS}, () => Array(COLS).fill(0));
}

function encodeBoard(b) {
  return b.map(row => row.join('')).join('|');
}

function decodeBoard(s) {
  if (!s) return createBoard();
  return s.split('|').map(row => row.split('').map(Number));
}

function randomColor() { return Math.floor(Math.random()*COLORS)+1; }

function createPiece() {
  return { main:{r:0,c:2,color:randomColor()}, sub:{r:1,c:2,color:randomColor()} };
}

function clonePiece(p) { return {main:{...p.main},sub:{...p.sub}}; }

function rotatePiece(p) {
  const dr=p.sub.r-p.main.r, dc=p.sub.c-p.main.c;
  const np=clonePiece(p);
  np.sub.r=p.main.r+dc; np.sub.c=p.main.c-dr;
  return np;
}

function isValid(p,b) {
  for (const pu of [p.main,p.sub]) {
    if (pu.c<0||pu.c>=COLS||pu.r>=ROWS) return false;
    if (pu.r>=0 && b[pu.r][pu.c]!==0) return false;
  }
  return true;
}

function placePiece(p,b) {
  for (const pu of [p.main,p.sub]) { if (pu.r>=0) b[pu.r][pu.c]=pu.color; }
}

function dropPiece(p) { const np=clonePiece(p); np.main.r++; np.sub.r++; return np; }
function movePiece(p,dc) { const np=clonePiece(p); np.main.c+=dc; np.sub.c+=dc; return np; }

function findGroups(b) {
  const vis=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  const groups=[];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    if (b[r][c]&&!vis[r][c]) {
      const color=b[r][c], group=[], stack=[[r,c]];
      while (stack.length) {
        const [cr,cc]=stack.pop();
        if (cr<0||cr>=ROWS||cc<0||cc>=COLS||vis[cr][cc]||b[cr][cc]!==color) continue;
        vis[cr][cc]=true; group.push([cr,cc]);
        stack.push([cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]);
      }
      if (group.length>=4) groups.push(group);
    }
  }
  return groups;
}

function removeGroups(b,groups) { groups.forEach(g=>g.forEach(([r,c])=>{b[r][c]=0;})); }

function applyGravity(b) {
  for (let c=0;c<COLS;c++) {
    let e=ROWS-1;
    for (let r=ROWS-1;r>=0;r--) {
      if (b[r][c]) { b[e][c]=b[r][c]; if(e!==r)b[r][c]=0; e--; }
    }
  }
}

function processChains(b) {
  let chain=0, total=0;
  while (true) {
    const groups=findGroups(b);
    if (!groups.length) break;
    chain++;
    const cleared=groups.reduce((s,g)=>s+g.length,0);
    total+=cleared*chain*10;
    removeGroups(b,groups); applyGravity(b);
    playChainSound(chain);
  }
  myChain=chain;
  document.getElementById('chainDisplay').textContent=chain;
  return {score:total, nuisance: Math.floor(total/NUISANCE_THRESHOLD)};
}

function playChainSound(chain) {
  if (!audioCtx || !audioOn) return;
  const freqs=[440,550,660,880,1100,1320];
  const f=freqs[Math.min(chain-1,freqs.length-1)];
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.frequency.value=f;
  o.type='triangle';
  g.gain.setValueAtTime(0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.3);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+0.35);
}

// ===== Drawing =====
function drawCirclePuyo(ctx2, x, y, size, colorIdx) {
  const cx=x+size/2, cy=y+size/2, r=size/2-2;
  ctx2.save();
  ctx2.beginPath();
  ctx2.arc(cx, cy, r, 0, Math.PI*2);
  ctx2.clip();
  if (imagesLoaded===4) {
    ctx2.drawImage(images[colorIdx-1], x+2, y+2, size-4, size-4);
  } else {
    const cols=['#e74c3c','#3498db','#2ecc71','#f39c12'];
    ctx2.fillStyle=cols[colorIdx-1]||'#fff';
    ctx2.fill();
  }
  ctx2.restore();
  // Shine
  ctx2.save();
  ctx2.beginPath();
  ctx2.arc(cx-r*0.25, cy-r*0.25, r*0.3, 0, Math.PI*2);
  ctx2.fillStyle='rgba(255,255,255,0.35)';
  ctx2.fill();
  ctx2.restore();
  // Outline
  ctx2.beginPath();
  ctx2.arc(cx, cy, r, 0, Math.PI*2);
  ctx2.strokeStyle='rgba(255,255,255,0.25)';
  ctx2.lineWidth=1.5;
  ctx2.stroke();
}

function drawBoardCanvas(ctx2, b, piece, cellSize) {
  const W=COLS*cellSize, H=ROWS*cellSize;
  ctx2.clearRect(0,0,W,H);
  // Grid lines
  ctx2.strokeStyle='rgba(255,255,255,0.04)';
  ctx2.lineWidth=0.5;
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    ctx2.strokeRect(c*cellSize,r*cellSize,cellSize,cellSize);
  }
  // Board
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    if (b[r][c]) drawCirclePuyo(ctx2,c*cellSize,r*cellSize,cellSize,b[r][c]);
  }
  // Current piece
  if (piece) {
    for (const pu of [piece.main,piece.sub]) {
      if (pu.r>=0) drawCirclePuyo(ctx2,pu.c*cellSize,pu.r*cellSize,cellSize,pu.color);
    }
  }
}

function drawNext() {
  const nc=document.getElementById('nextCanvas');
  const nctx=nc.getContext('2d');
  nctx.clearRect(0,0,80,80);
  if (!nextPiece) return;
  const cs=32;
  for (const pu of [nextPiece.main,nextPiece.sub]) {
    const r=pu.r-nextPiece.main.r;
    const c=pu.c-nextPiece.main.c;
    drawCirclePuyo(nctx,(c+0.75)*cs+2,(r+0.1)*cs+2,cs,pu.color);
  }
}

// ===== Board rendering for opponents (small) =====
const SMALL_CELL = 14;
const otherCanvases = {}; // uid -> canvas

function ensureOpponentCanvas(uid, name, isMe) {
  if (otherCanvases[uid]) return;
  const area=document.getElementById('boardsArea');
  const wrap=document.createElement('div');
  wrap.className='board-wrap'+(isMe?' me':'');
  wrap.id='wrap_'+uid;
  const label=document.createElement('div');
  label.className='board-label'+(isMe?' me':'');
  label.textContent=name+(isMe?' ★':'');
  const score=document.createElement('div');
  score.className='board-score';
  score.id='bscore_'+uid;
  score.textContent='0';
  const cellS=isMe?CELL:SMALL_CELL;
  const cv=document.createElement('canvas');
  cv.width=COLS*cellS; cv.height=ROWS*cellS;
  const dead=document.createElement('div');
  dead.className='dead-overlay';
  dead.innerHTML='<span>DEAD</span>';
  wrap.appendChild(label);
  wrap.appendChild(score);
  wrap.appendChild(cv);
  wrap.appendChild(dead);
  otherCanvases[uid]={canvas:cv,ctx:cv.getContext('2d'),wrap,score,cellS};
  if (isMe) {
    area.prepend(wrap);
    myCanvas=cv; myCtx=cv.getContext('2d');
  } else {
    area.appendChild(wrap);
  }
}

// ===== Game Start =====
function startGame(room) {
  clearInterval(waitingSyncInterval);
  document.getElementById('waitingScreen').style.display='none';
  document.getElementById('gameScreen').style.display='flex';

  myBoard=createBoard();
  myScore=0; myLevel=1; myChain=0; myDead=false; nuisancePending=0;
  document.getElementById('myScore').textContent='0';
  document.getElementById('myLevel').textContent='1';
  document.getElementById('myNuisance').textContent='0';
  document.getElementById('chainDisplay').textContent='0';

  // Build boards area
  document.getElementById('boardsArea').innerHTML='';
  Object.keys(otherCanvases).forEach(k=>delete otherCanvases[k]);

  // Create my canvas first
  const players=room.players||{};
  ensureOpponentCanvas(MY_ID,playerName,true);
  Object.entries(players).forEach(([uid,p])=>{
    if (uid!==MY_ID) ensureOpponentCanvas(uid,p.name,false);
  });

  currentPiece=createPiece();
  nextPiece=createPiece();
  drawNext();

  gameActive=true;
  lastTime=0; fastDrop=false;
  if (animFrameId) cancelAnimationFrame(animFrameId);
  animFrameId=requestAnimationFrame(gameLoop);

  clearInterval(syncInterval);
  syncInterval=setInterval(syncGame,800);
  syncGame();

  if (!audioOn && !audioCtx) {
    // prompt audio on first interaction
  }
}

async function syncGame() {
  if (!currentRoomId) return;
  const now=Date.now();

  // Upload my state
  if (!myDead) {
    await fbPatch(`rooms/${currentRoomId}/players/${MY_ID}`, {
      board: encodeBoard(myBoard),
      score: myScore,
      alive: true,
      nuisance: nuisancePending,
      lastSeen: now
    });
  }

  // Fetch others
  const room=await fbGet(`rooms/${currentRoomId}`);
  if (!room) return;
  const players=room.players||{};
  let aliveCount=0;

  Object.entries(players).forEach(([uid,p]) => {
    if (!p) return;
    const alive=p.alive!==false && (now-(p.lastSeen||0))<10000;
    if (alive) aliveCount++;
    if (uid===MY_ID) return;

    // Ensure canvas exists
    if (!otherCanvases[uid]) ensureOpponentCanvas(uid,p.name||'?',false);

    const info=otherCanvases[uid];
    if (!info) return;
    const b=decodeBoard(p.board);
    drawBoardCanvas(info.ctx,b,null,info.cellS);
    info.score.textContent=p.score||0;

    if (!alive) {
      info.wrap.classList.add('dead');
    }
  });

  document.getElementById('aliveCount').textContent=aliveCount;

  // Game over check
  if (myDead) {
    const othersAlive=Object.entries(players).filter(([uid,p])=>uid!==MY_ID&&p&&p.alive!==false&&(now-(p.lastSeen||0))<10000);
    if (othersAlive.length<=1) {
      endGame(players);
    }
  }
}

function gameLoop(ts) {
  if (!gameActive) return;
  if (!lastTime) lastTime=ts;
  const speed=fastDrop?50:Math.max(100,800-(myLevel-1)*60);
  if (ts-lastTime>speed) {
    lastTime=ts;
    const dropped=dropPiece(currentPiece);
    if (isValid(dropped,myBoard)) {
      currentPiece=dropped;
    } else {
      lockAndProcess();
    }
  }
  if (myCtx) drawBoardCanvas(myCtx,myBoard,currentPiece,CELL);
  animFrameId=requestAnimationFrame(gameLoop);
}

function lockAndProcess() {
  placePiece(currentPiece,myBoard);

  // Apply nuisance from opponents
  if (nuisancePending>0) {
    addNuisance(myBoard,nuisancePending);
    nuisancePending=0;
    document.getElementById('myNuisance').textContent='0';
  }

  const {score,nuisance}=processChains(myBoard);
  if (score>0) {
    myScore+=score;
    myLevel=Math.floor(myScore/500)+1;
    document.getElementById('myScore').textContent=myScore;
    document.getElementById('myLevel').textContent=myLevel;

    // Send nuisance to random opponent
    if (nuisance>0) sendNuisance(nuisance);
  }

  currentPiece=nextPiece;
  nextPiece=createPiece();
  drawNext();
  fastDrop=false;

  if (!isValid(currentPiece,myBoard)) {
    myDead=true;
    gameActive=false;
    cancelAnimationFrame(animFrameId);
    fbPatch(`rooms/${currentRoomId}/players/${MY_ID}`,{alive:false,score:myScore});
    showDeadOverlay();
  }
}

function showDeadOverlay() {
  const info=otherCanvases[MY_ID];
  if (info) info.wrap.classList.add('dead');
}

function addNuisance(b, count) {
  // Add nuisance (grey) to top rows
  const nuisanceColor=5; // special
  for (let i=0;i<Math.min(count,COLS);i++) {
    // Use color cycling for nuisance visual
    b[0][i]=Math.floor(Math.random()*COLORS)+1;
  }
  applyGravity(b);
}

async function sendNuisance(amount) {
  // Send to a random alive opponent
  const room=await fbGet(`rooms/${currentRoomId}`);
  if (!room) return;
  const alive=Object.entries(room.players||{}).filter(([uid,p])=>uid!==MY_ID&&p&&p.alive!==false);
  if (!alive.length) return;
  const [tid]=alive[Math.floor(Math.random()*alive.length)];
  const cur=(await fbGet(`rooms/${currentRoomId}/players/${tid}/nuisance`))||0;
  await fbSet(`rooms/${currentRoomId}/players/${tid}/nuisance`,cur+amount);
}

async function endGame(players) {
  clearInterval(syncInterval);
  gameActive=false;

  // Sort by score
  const sorted=Object.entries(players).sort(([,a],[,b])=>(b.score||0)-(a.score||0));
  const myRank=sorted.findIndex(([uid])=>uid===MY_ID)+1;

  document.getElementById('gameScreen').style.display='none';
  document.getElementById('resultsScreen').style.display='flex';

  const isWinner=myRank===1;
  document.getElementById('resultsTitle').textContent=isWinner?'🏆 優勝！':'GAME OVER';
  document.getElementById('resultsTitle').style.color=isWinner?'#ffd700':'#ff6b6b';
  document.getElementById('resultsRank').textContent=`あなたの順位: ${myRank}位 / ${sorted.length}人`;

  const list=document.getElementById('resultsList');
  list.innerHTML='';
  sorted.forEach(([uid,p],i)=>{
    const row=document.createElement('div');
    row.className='result-row'+(i===0?' winner':'');
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
    row.innerHTML=`<div class="result-rank">${medal}</div><div class="result-name">${escHtml(p.name||'?')}${uid===MY_ID?' ★':''}</div><div class="result-score">${p.score||0}pts</div>`;
    list.appendChild(row);
  });
}

function backToLobby() {
  document.getElementById('resultsScreen').style.display='none';
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('waitingScreen').style.display='none';
  document.getElementById('lobbyScreen').style.display='flex';
  currentRoomId=null;
  gameActive=false;
  Object.keys(otherCanvases).forEach(k=>delete otherCanvases[k]);
  loadRoomList();
  roomListInterval=setInterval(loadRoomList,5000);
}

// ===== Controls =====
document.addEventListener('keydown', e => {
  if (!gameActive||!currentPiece) return;
  let np;
  switch(e.key) {
    case 'ArrowLeft': np=movePiece(currentPiece,-1); if(isValid(np,myBoard))currentPiece=np; e.preventDefault(); break;
    case 'ArrowRight': np=movePiece(currentPiece,1); if(isValid(np,myBoard))currentPiece=np; e.preventDefault(); break;
    case 'ArrowDown': fastDrop=true; e.preventDefault(); break;
    case 'ArrowUp': case 'z': case 'Z':
      np=rotatePiece(currentPiece);
      if(isValid(np,myBoard))currentPiece=np;
      else { for(const dc of[-1,1,-2,2]){const k=movePiece(np,dc);if(isValid(k,myBoard)){currentPiece=k;break;}} }
      e.preventDefault(); break;
    case ' ':
      while(true){const d=dropPiece(currentPiece);if(isValid(d,myBoard))currentPiece=d;else break;}
      lockAndProcess(); lastTime=0; e.preventDefault(); break;
  }
  if (myCtx) drawBoardCanvas(myCtx,myBoard,currentPiece,CELL);
});
document.addEventListener('keyup', e => { if(e.key==='ArrowDown')fastDrop=false; });

// Click to init audio
document.addEventListener('click', ()=>{
  if (!audioCtx) initAudio();
}, {once:true});

// ===== INIT =====
loadRoomList();
roomListInterval=setInterval(loadRoomList,5000);

// Set default name
const savedName=localStorage.getItem('puyoName');
if (savedName) document.getElementById('playerName').value=savedName;
document.getElementById('playerName').addEventListener('change',e=>{
  localStorage.setItem('puyoName',e.target.value);
});
</script>
</body>
</html>
